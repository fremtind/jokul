name: Publiser Jøkul-pakker

on:
    push:
        branches: [ "main", "release/next", "jokul-*" ]

concurrency:
    group: release-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

run-name: Publiser ny versjon av Jøkul-pakker. Siste commit er ${{ github.event.head_commit.message }}

jobs:
    release:
        name: Versjoner eller publiser pakker med Changesets
        runs-on: ubuntu-latest
        outputs:
            published: ${{ steps.changesets.outputs.published || 'false' }}
            publishedPackages: ${{ steps.changesets.outputs.publishedPackages || '[]' }}
        permissions:
            id-token: write # OIDC for publisering til NPM: https://docs.npmjs.com/trusted-publishers
            contents: write
            packages: write
            pull-requests: write
        steps:
            - name: Checkout Repo
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  registry-url: "https://registry.npmjs.org/"
                  node-version-file: ".nvmrc"
                  cache: "pnpm"

            - name: Finn release-tag
              id: release-tag
              shell: bash
              run: |
                  if [[ "$GITHUB_REF_NAME" = "main" ]]; then
                    exit 0
                  elif [[ "$GITHUB_REF_NAME" =~ ^jokul-(\d)\.x$ ]]; then
                    echo "tag=version-${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
                    exit 0
                  elif [[ -f .changeset/pre.json ]]; then
                    node --input-type=module <<'NODE'
                    import { appendFileSync, readFileSync } from "node:fs";

                    const writeOutput = (key, value) => {
                        appendFileSync(process.env.GITHUB_OUTPUT, `${key}=${value}\n`);
                    };

                    const preSettings = JSON.parse(readFileSync(".changeset/pre.json", "utf8"));

                    writeOutput("tag", preSettings.tag);
                    process.exit(0);
                  NODE
                  fi
                  exit 1


            - name: Installer avhengigheter
              run: |
                  pnpm install --frozen-lockfile
                  npm install -g npm@latest
                  npm --version

            - name: Versjonering eller publisering med Changesets
              id: changesets
              uses: changesets/action@746c25e23caa47dceb6a48ee85b4cbc5a9f5f293
              with:
                  publish: "pnpm release:publish"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Bytt registry til GitHub Packages
              if: steps.changesets.outputs.published == 'true'
              uses: actions/setup-node@v4
              with:
                  registry-url: "https://npm.pkg.github.com"
                  scope: "@fremtind"

            - name: Tilbakestill endringer i .npmrc
              if: steps.changesets.outputs.published == 'true'
              # Unngår å få feil ved publisering pga. unclean git status
              run: git checkout .npmrc

            - name: Reinstaller pakker etter actions/setup-node
              if: steps.changesets.outputs.published == 'true'
              run: pnpm install --frozen-lockfile

            - name: Publiser pakker til GitHub Packages med riktig tag
              if: steps.changesets.outputs.published == 'true'
              run: pnpm -r publish --tag ${{ steps.release-tag.outputs.tag || 'latest' }} --publish-branch ${{ github.ref_name }}
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
