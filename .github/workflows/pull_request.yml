name: Pull request

on:
    pull_request:
        branches: [ "main", "release/next", "jokul-*" ]
    merge_group:
        types: [ checks_requested ]

run-name: Bygg og test ${{ github.event_name == 'pull_request' && github.event.pull_request.title || github.ref_name }}

env:
    PREFIX_PATHS: true

jobs:
    changes:
        name: Sjekk for endringer
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request'
        permissions:
            actions: write
            contents: read
        outputs:
            jokul: ${{ steps.code_changes.outputs.jokul }}
            components: ${{ steps.code_changes.outputs.components }}
            figma_code_connect: ${{ steps.code_changes.outputs.figma_code_connect }}
            preview: ${{ steps.code_changes.outputs.preview }}
            testlint: ${{ steps.code_changes.outputs.general }}
            code_changes: ${{ steps.code_changes.outputs.has_matches }}
            stories: ${{ steps.documentation.outputs.stories }}
            changeset: ${{ steps.documentation.outputs.preview }}
            documentation: ${{ steps.documentation.outputs.has_matches }}
        steps:
            -   name: Checkout
                uses: actions/checkout@v3

            -   name: Se etter kodeendringer
                uses: ./actions/paths-filter
                id: code_changes
                with:
                    filters: |
                        jokul:
                          - "packages/jokul/src/**/*.scss"
                          - "packages/jokul/src/**/!(*.stories|*.test|*.d).ts"
                          - "packages/jokul/src/**/!(*.stories|*.test).tsx"
                        components:
                          - "packages/jokul/src/components/**/*.scss"
                          - "packages/jokul/src/components/**/!(*.stories|*.test|*.d).ts"
                          - "packages/jokul/src/components/**/!(*.stories|*.test).tsx"
                          - "packages/jokul/src/components-beta/**/*.scss"
                          - "packages/jokul/src/components-beta/**/!(*.stories|*.test|*.d).ts"
                          - "packages/jokul/src/components-beta/**/!(*.stories|*.test).tsx"
                        figma_code_connect:
                          - "packages/jokul/figma.config.json"
                          - "packages/jokul/package.json"
                          - "pnpm-lock.yaml"
                          - "packages/jokul/src/components/**/!(*.stories|*.test|*.d).ts"
                          - "packages/jokul/src/components/**/!(*.stories|*.test).tsx"
                        preview:
                          - ".storybook/**/*.(ts|tsx|scss|html)"
                          - "storybook-public/**/*"
                          - "packages/jokul/src/**/*.stories.tsx"
                          - "packages/jokul/src/**/*.scss"
                          - "packages/jokul/src/**/!(*.stories|*.test|*.d).ts"
                          - "packages/jokul/src/**/!(*.stories|*.test).tsx"
                          - "packages/jokul/src/**/*.json"
                          - "packages/jokul/src/fonts/**/*"
                        general:
                          - "*.js"
                          - "*.scss"
                          - "*.ts"
                          - "*.tsx"
                          - "vite.test.config.mjs"
                          - "pnpm-lock.yaml"

            -   name: Se etter dokumentasjonsendringer
                uses: ./actions/paths-filter
                id: documentation
                with:
                    filters: |
                        stories:
                          - ".storybook/**/*.(ts|tsx|scss|html)"
                          - "storybook-public/**/*"
                          - "packages/jokul/src/**/*.stories.tsx"
                        changeset:
                          - ".changeset/!(README).md"

            -   name: Minn om dokumentasjon
                # Dette legger til en kommentar i PRen hvis det er endringer i pakkene uten at det er lagt til
                # et changeset eller stories, avhengig av hva som er endret.
                if: github.event_name != 'merge_group' && (steps.code_changes.outputs.jokul == 'true' && steps.documentation.outputs.changeset == 'false') || (steps.code_changes.outputs.components == 'true' && steps.documentation.outputs.stories == 'false')
                uses: marocchino/sticky-pull-request-comment@da224cb0e3c8b27cae68d40c93649421b5b93e45
                with:
                    header: reminders
                    GITHUB_TOKEN: ${{ secrets.FREMTIND_BOT_ACCESS_TOKEN }}
                    message: |
                        Hei, @${{ github.event.sender.login }}! Takk for at du bidrar til Jøkul! 🙌
                        For å sørge for god dokumentasjon og brukeropplevelse er det fint om du husker å gjøre disse tingene:

                        - [ ] **Test endringene dine** ♿️
                          Sørg for å teste endringene dine for både responsivitet og universell utforming (tastaturnavigasjon, skjermleser, etc.).
                        ${{ steps.documentation.outputs.changeset == 'false' && '- [ ] **Skriv endringslogg** 📝
                          Sørg for at du har dokumentert endringene i et [changeset](https://github.com/changesets/changesets/blob/main/docs/adding-a-changeset.md) hvis de skal føre til en ny release av `@fremtind/jokul`.' }}
                        ${{ steps.code_changes.outputs.components == 'true' && steps.documentation.outputs.stories == 'false' &&  '- [ ] **Oppdater eller lag nye stories** 📚
                          Hvis du har endret eller lagt til ny funksjonalitet i komponenter må du huske å oppdatere eller legge til [Storybook-stories](https://storybook.js.org/docs/get-started/whats-a-story) for dette i komponenten(e).
                        - [ ] **Oppdater informasjon i Sanity** 📖
                          Hvis du har endret eller lagt til ny funksjonalitet i komponenter må du huske å oppdatere informasjonen om komponenten(e) i Sanity.' }}

                        Hvis du lurer på hvordan du kommer i gang med noe av dette, er det bare å spørre oss i Jøkul-teamet om hjelp! Tagg oss i en kommentar her, eller spør oss [på Teams](https://teams.microsoft.com/l/channel/19%3Adb7fc5da697547ad8a199247b3be66dc%40thread.skype/Support%20Designsystem?groupId=460dde26-9370-4131-8b04-61b3e9b47048&tenantId=273051d7-ce03-4594-b66d-0c68e4c778c0).


    backport-info:
        name: Informer om automatisk backport
        needs: changes
        if: >
            github.event_name == 'pull_request' &&
            github.event.pull_request.base.ref == 'release/next' &&
            needs.changes.outputs.changeset == 'true'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Finn endrede changeset-filer
              id: changesets
              run: |
                  files="$(git diff --name-only --diff-filter=A "origin/${{ github.event.pull_request.base.ref }}...HEAD" -- '.changeset/*.md' 2>/dev/null || true)"
                  echo "files<<EOF" >> "$GITHUB_OUTPUT"
                  echo "$files" >> "$GITHUB_OUTPUT"
                  echo "EOF" >> "$GITHUB_OUTPUT"

            - name: Bestem endrings-nivå og målbrancher
              id: backport
              run: |
                  changeset_files="${{ steps.changesets.outputs.files }}"

                  if [ -z "$changeset_files" ]; then
                    echo "level=none" >> "$GITHUB_OUTPUT"
                    echo "targets=" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  private_packages="$(node -e "
                    const fs = require('fs');
                    const dirs = [
                      ...fs.readdirSync('actions').map(d => 'actions/' + d),
                      ...fs.readdirSync('packages').map(d => 'packages/' + d),
                      'portal', 'utils'
                    ];
                    const names = [];
                    for (const dir of dirs) {
                      const p = dir + '/package.json';
                      if (!fs.existsSync(p)) continue;
                      const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
                      if (pkg.private && pkg.name) names.push(pkg.name);
                    }
                    process.stdout.write(names.join('\n'));
                  " 2>/dev/null)"

                  highest="none"
                  for file in $changeset_files; do
                    [ -f "$file" ] || continue
                    header="$(awk '/^---$/{found++; next} found==1{print} found==2{exit}' "$file")"
                    while IFS= read -r line; do
                      pkg="$(echo "$line" | sed 's/^["\x27]*//; s/["\x27]*:.*//' | xargs)"
                      lvl="$(echo "$line" | sed 's/.*:[[:space:]]*//' | xargs)"
                      echo "$private_packages" | grep -qxF "$pkg" && continue
                      case "$lvl" in
                        major) highest="major" ;;
                        minor) [ "$highest" != "major" ] && highest="minor" ;;
                        patch) [ "$highest" = "none" ] && highest="patch" ;;
                      esac
                    done <<< "$header"
                  done

                  echo "level=$highest" >> "$GITHUB_OUTPUT"

                  if [ "$highest" = "none" ] || [ "$highest" = "major" ]; then
                    echo "targets=" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  targets="$(node -e "
                    const config = JSON.parse(require('fs').readFileSync('.github/supported-versions.json', 'utf8'));
                    const level = '$highest';
                    const order = ['patch', 'minor', 'major'];
                    const levelIdx = order.indexOf(level);
                    const targets = config.stable
                      .filter(e => e.receives.some(r => order.indexOf(r) >= levelIdx))
                      .map(e => '\`' + e.branch + '\`')
                      .join(', ');
                    process.stdout.write(targets);
                  ")"
                  echo "targets=$targets" >> "$GITHUB_OUTPUT"

            - name: Post backport-informasjon (backport vil skje)
              if: steps.backport.outputs.targets != ''
              uses: marocchino/sticky-pull-request-comment@da224cb0e3c8b27cae68d40c93649421b5b93e45
              with:
                  header: backport-info
                  GITHUB_TOKEN: ${{ secrets.FREMTIND_BOT_ACCESS_TOKEN }}
                  message: |
                      > [!NOTE]
                      > **Automatisk backport** vil bli utført når denne PR-en merges.
                      >
                      > Endrings-nivå: `${{ steps.backport.outputs.level }}`
                      > Målbrancher: ${{ steps.backport.outputs.targets }}
                      >
                      > Ønsker du ikke backport? Legg til labelen `no-backport` på PR-en.

            - name: Fjern backport-informasjon (major eller ingen changeset for publiserte pakker)
              if: steps.backport.outputs.targets == ''
              uses: marocchino/sticky-pull-request-comment@da224cb0e3c8b27cae68d40c93649421b5b93e45
              with:
                  header: backport-info
                  delete: true
                  GITHUB_TOKEN: ${{ secrets.FREMTIND_BOT_ACCESS_TOKEN }}

    testlint:
        name: Kjør tester og linting
        needs: changes
        # Vi vil alltid kjøre denne jobben, men avgjør om tester skal kjøres
        # ut fra om vi er i merge-køen eller det er endringer i koden.
        if: ${{ always() }}
        runs-on: ubuntu-latest
        permissions:
            actions: read
            contents: read
        steps:
            -   name: Checkout
                uses: actions/checkout@v3

            -   name: Setup pnpm
                uses: pnpm/action-setup@v4

            -   name: Setup Node
                uses: actions/setup-node@v4
                with:
                    node-version-file: '.nvmrc'
                    cache: "pnpm"

            -   name: "Ingen endringer i kode, hopp over"
                if: github.event_name != 'merge_group' && needs.changes.outputs.code_changes == 'false'
                run: echo "Ingen endringer i kode, hopper over tester og linting."

                # Steget må være med, men vil være cachet
            -   name: Installer avhengigheter
                if: github.event_name == 'merge_group' || needs.changes.outputs.code_changes == 'true'
                run: pnpm install

            -   name: Bygg pakker
                if: github.event_name == 'merge_group'  || needs.changes.outputs.code_changes == 'true'
                run: pnpm build

            -   name: Lint og test
                if: github.event_name == 'merge_group' || needs.changes.outputs.code_changes == 'true'
                run: pnpm ci:test

            -   name: Sjekk Figma Code Connect
                id: code_connect
                if: github.event_name != 'merge_group' && needs.changes.outputs.figma_code_connect == 'true'
                continue-on-error: true
                shell: bash
                run: |
                    set -o pipefail
                    pnpm --filter @fremtind/jokul run figma:test:ci 2>&1 | tee figma-code-connect.log
                env:
                  FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_CODE_CONNECT_TOKEN }}

            -   name: Oppsummer feil i Figma Code Connect
                id: code_connect_summary
                if: always() && steps.code_connect.outcome == 'failure'
                shell: bash
                run: |
                    {
                        echo "### Figma Code Connect feilet"
                        echo
                        echo '```text'
                        tail -n 40 figma-code-connect.log
                        echo '```'
                    } >> "$GITHUB_STEP_SUMMARY"

                    {
                        echo "log_excerpt<<EOF"
                        tail -n 40 figma-code-connect.log
                        echo "EOF"
                    } >> "$GITHUB_OUTPUT"

            -   name: Si fra om feil i Figma Code Connect
                if: github.event_name == 'pull_request' && steps.code_connect.outcome == 'failure'
                uses: marocchino/sticky-pull-request-comment@da224cb0e3c8b27cae68d40c93649421b5b93e45
                with:
                    header: figma-code-connect
                    GITHUB_TOKEN: ${{ secrets.FREMTIND_BOT_ACCESS_TOKEN }}
                    message: |
                        > [!WARNING]
                        > @${{ github.event.sender.login }}, Figma Code Connect feilet.
                        >
                        > Se workflow-kjøringen for full logg.

                        <details>
                        <summary>Kort utdrag av loggen</summary>

                        ```text
                        ${{ steps.code_connect_summary.outputs.log_excerpt }}
                        ```

                        </details>

            -   name: Fjern varsel om Figma Code Connect-feil
                if: github.event_name == 'pull_request' && steps.code_connect.outcome != 'failure'
                uses: marocchino/sticky-pull-request-comment@da224cb0e3c8b27cae68d40c93649421b5b93e45
                with:
                    header: figma-code-connect
                    delete: true
                    GITHUB_TOKEN: ${{ secrets.FREMTIND_BOT_ACCESS_TOKEN }}

    preview:
        name: Publiser forhåndsvisning
        needs: changes
        if: github.event_name != 'merge_group' && needs.changes.outputs.preview == 'true'
        runs-on: ubuntu-latest
        env:
            PREVIEW_PATH: preview/${{ github.event.pull_request.head.ref }}
        permissions:
            actions: write
            contents: read
            pull-requests: write
        steps:
            -   name: Checkout
                uses: actions/checkout@v3

            -   name: Setup pnpm
                uses: pnpm/action-setup@v4

            -   name: Setup Node
                uses: actions/setup-node@v4
                with:
                    node-version-file: '.nvmrc'
                    cache: "pnpm"

                # Steget må være med, men vil være cachet
            -   name: Install dependencies
                run: pnpm install

            -   name: Add a comment with a link to the preview
                uses: marocchino/sticky-pull-request-comment@da224cb0e3c8b27cae68d40c93649421b5b93e45
                with:
                    header: preview
                    GITHUB_TOKEN: ${{ secrets.FREMTIND_BOT_ACCESS_TOKEN }}
                    message: |
                        <span aria-hidden="true">🔄</span> **Gjør klar en forhåndsvisning…**
                        <span aria-hidden="true">🔍</span> Commit: ${{ github.sha }}

            -   name: Build packages and site
                run: pnpm build && pnpm build:storybook

            -   name: Deploy preview
                env:
                    GH_TOKEN: ${{ secrets.BOT_PUBLISH_TOKEN }}
                run: |
                    git config user.email "fremtind.designsystem@fremtind.no"
                    git config user.name "fremtind-bot"
                    git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/fremtind/jokul.git
                    pnpm gh-pages --add --dist storybook-static --dest ${{ env.PREVIEW_PATH }} --message "docs: preview #${{ github.event.number }}"

            -   name: Add a comment with a link to the preview
                uses: marocchino/sticky-pull-request-comment@da224cb0e3c8b27cae68d40c93649421b5b93e45
                with:
                    header: preview
                    GITHUB_TOKEN: ${{ secrets.FREMTIND_BOT_ACCESS_TOKEN }}
                    message: |
                        <span aria-hidden="true">✅</span> Forhåndsvisning: https://jokul.fremtind.no/${{ env.PREVIEW_PATH }}/
                        <span aria-hidden="true">🔍</span> Commit: ${{ github.sha }}

                        Forhåndsvisningen blir tilgjengelig innen et par minutter. Den fjernes automatisk når pull requesten lukkes.
