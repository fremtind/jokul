name: Monthly tasks
on:
    schedule:
        # at 06:13 on the first day of the month
        - cron: 13 06 1 * *

jobs:
    security_overrides:
        name: Sjekk om sikkerhetsoverrides kan fjernes
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v3

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install

            - name: Sjekk sikkerhetsoverrides
              run: pnpm check:security-overrides

    create_issue:
        name: Create issue to upgrade dependencies
        runs-on: ubuntu-latest
        permissions:
            issues: write
        steps:
            - name: Create issue to upgrade dependencies
              uses: imjohnbo/issue-bot@76645b39cda009302cc49d8624af634795e9eab5
              with:
                  assignees: "zenabii, kristianulv23, piofinn, fremtindelise, lmfaole"
                  rotate-assignees: true
                  labels: "рџ”Ѓ round robin, рџ”— dependencies"
                  close-previous: true
                  title: "Oppdatering av avhengigheter"
                  body: |
                      ## FremgangsmГҐte

                      рџ§‘вЂЌрџ’» KjГёr `git pull` pГҐ `main` og lag en ny branch.
                      рџ§‘вЂЌрџ’» KjГёr `pnpm update -r` pГҐ rotnivГҐ i prosjektet.
                      рџ§‘вЂЌрџ’» KjГёr `pnpm outdated -r` pГҐ rotnivГҐ i prosjektet.

                      Output fra `pnpm outdated` vil vise deg hvilke pakker som trenger ГҐ oppdateres manuelt, men ogsГҐ noen som ikke _kan_ oppdateres. Noen ganger har vi avhengigheter som trenger en eldre majorversjon av en pakke.

                      Du kan sannsynligvis trygt ignorere `overrides` med mindre noe brekker senere.

                      Vi bruker `pnpm.overrides`-feltet i `package.json` til ГҐ overstyre vГҐre dependencies sine dependencies. Generelt sett gjГёr vi dette for ГҐ fГҐ med oss feilrettinger og sikkerhetsoppdateringer. Noen ganger er disse avhengigheter av avhengigheter av avhengigheter, og ett eller annet sted pГҐ veien er en pakke ikke vedlikeholdt.

                      рџ§‘вЂЌрџ’» Endre versjoner i `package.json` til versjonen du Гёnsker.

                      Som nevnt kan du sannsynligvis ignorere `overrides`. Typedefinisjoner for Node kan du la vГ¦re til vi eventuelt endrer `.nvmrc`.

                      рџ§‘вЂЌрџ’» KjГёr `pnpm install`.

                      Du skal fГҐ en oppdatert `pnpm-lock.yaml`. Ta en titt pГҐ diffen og se at det virker fornuftig.

                      рџ§‘вЂЌрџ’» KjГёr `pnpm audit --fix` pГҐ rotnivГҐ i prosjektet.

                      Hvis det er audit-problemer etter oppdateringen din kan det hende du mГҐ legge til noen overstyringer i `resolutions` i `package.json`. Se [pnpm-dokumentasjonen](https://classic.pnpmpkg.com/lang/en/docs/selective-version-resolutions/) om du ikke har gjort dette fГёr, eller spГёr en kollega om hjelp.

                      рџ§‘вЂЌрџ’» Lag eventuelle nye patcher.

                      Vi har [noen fГҐ pakker hvor vi gjГёr egne patcher](https://github.com/fremtind/jokul/tree/main/patches) i JГёkul. Disse krever at vi lager en tilsvarende patch pГҐ den nye versjonen. Se README for instrukser.

                      рџ§‘вЂЌрџ’» KjГёr `pnpm build:docs`, `pnpm ci:test` og `pnpm start`.

                      Sjekk at ting fortsatt bygger, tester gГҐr grГёnt, og at siden funker OK.

                      TypeScript kan finne pГҐ ГҐ klage over at noe er definert to ganger. Det er typisk `@types/eslint`, `@types/node`, `@types/react` eller `@types/react-dom` som er kilden. Du mГҐ i disse tilfellene inn og endre manuelt pГҐ lockfila sГҐ vi ikke ender opp med duplikate versjoner. SpГёr en kollega om du stГҐr fast.

                      рџ§‘вЂЌрџ’» KjГёr `pnpm commit` og lag en `chore`-commit.

                      Snart klar for en pull request!

                      рџ§‘вЂЌрџ’» Push endringene dine og ГҐpne en pull request.
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
