name: Synk release/next med main

on:
    push:
        branches:
            - main
    workflow_dispatch:

env:
    SOURCE_BRANCH: main
    TARGET_BRANCH: release/next
    SYNC_BRANCH: sync-main-to-release-next
    SYNC_PR_TITLE: "chore: sync main into release/next"

concurrency:
    group: sync-release-next-${{ github.ref }}
    cancel-in-progress: false

run-name: Synk release/next med main

jobs:
    sync-release-next:
        name: Merge main til release/next
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Hent SHA for main
              id: main-ref
              run: |
                  main_sha="$(gh api /repos/${{ github.repository }}/git/ref/heads/${{ env.SOURCE_BRANCH }} --jq '.object.sha')"
                  echo "sha=$main_sha" >> "$GITHUB_OUTPUT"
                  echo "short_sha=${main_sha::7}" >> "$GITHUB_OUTPUT"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Merge main til release/next
              id: merge
              run: |
                  response_file="$(mktemp)"
                  http_status="$(curl -sS -o "$response_file" -w "%{http_code}" \
                    -X POST \
                    -H "Accept: application/vnd.github+json" \
                    -H "Authorization: Bearer $GITHUB_TOKEN" \
                    -H "X-GitHub-Api-Version: 2022-11-28" \
                    "https://api.github.com/repos/${{ github.repository }}/merges" \
                    -d '{"base":"${{ env.TARGET_BRANCH }}","head":"${{ env.SOURCE_BRANCH }}"}')"

                  cat "$response_file"

                  if [ "$http_status" = "201" ] || [ "$http_status" = "204" ]; then
                    echo "status=merged" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  if [ "$http_status" = "409" ]; then
                    echo "status=conflict" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  echo "Kunne ikke merge ${{ env.SOURCE_BRANCH }} til ${{ env.TARGET_BRANCH }}. GitHub API svarte med HTTP $http_status."
                  exit 1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Lukk gammel sync-PR hvis branchen ble oppdatert direkte
              if: steps.merge.outputs.status == 'merged'
              run: |
                  pr_number="$(gh pr list \
                    --repo "${{ github.repository }}" \
                    --head "${{ env.SYNC_BRANCH }}" \
                    --base "${{ env.TARGET_BRANCH }}" \
                    --state open \
                    --json number \
                    --jq '.[0].number // ""')"

                  if [ -z "$pr_number" ]; then
                    echo "Ingen åpen sync-PR å lukke."
                    exit 0
                  fi

                  gh pr close "$pr_number" \
                    --repo "${{ github.repository }}" \
                    --comment "Lukker denne automatisk fordi \`${{ env.SOURCE_BRANCH }}\` nå ble merget direkte inn i \`${{ env.TARGET_BRANCH }}\`."
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Opprett eller oppdater sync-branch
              if: steps.merge.outputs.status == 'conflict'
              id: sync-branch
              run: |
                  if ! gh api /repos/${{ github.repository }}/branches/${{ env.SYNC_BRANCH }} > /dev/null 2>&1; then
                    gh api --method POST /repos/${{ github.repository }}/git/refs \
                      -f ref="refs/heads/${{ env.SYNC_BRANCH }}" \
                      -f sha="${{ steps.main-ref.outputs.sha }}"

                    echo "branch_state=created" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  compare_status="$(gh api /repos/${{ github.repository }}/compare/${{ env.SOURCE_BRANCH }}...${{ env.SYNC_BRANCH }} --jq '.status')"

                  case "$compare_status" in
                    behind|identical)
                      gh api --method PATCH /repos/${{ github.repository }}/git/refs/heads/${{ env.SYNC_BRANCH }} \
                        -f sha="${{ steps.main-ref.outputs.sha }}" \
                        -F force=true > /dev/null
                      echo "branch_state=updated" >> "$GITHUB_OUTPUT"
                      ;;
                    ahead|diverged)
                      echo "branch_state=manual" >> "$GITHUB_OUTPUT"
                      ;;
                    *)
                      echo "Uventet compare-status for sync-branch: $compare_status"
                      exit 1
                      ;;
                  esac
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Opprett eller oppdater pull request for konfliktløsning
              if: steps.merge.outputs.status == 'conflict'
              run: |
                  case "${{ steps.sync-branch.outputs.branch_state }}" in
                    created|updated)
                      branch_message="Sync-branchen \`${{ env.SYNC_BRANCH }}\` peker nå til \`${{ env.SOURCE_BRANCH }}\` på commit \`${{ steps.main-ref.outputs.sha }}\` og er klar for manuell konfliktløsning."
                      ;;
                    manual)
                      branch_message="Sync-branchen \`${{ env.SYNC_BRANCH }}\` har allerede egne commits og ble ikke flyttet automatisk. Merge eller rebas \`${{ env.SOURCE_BRANCH }}\` inn i branchen manuelt før PR-en merges."
                      ;;
                    *)
                      echo "Ukjent branch_state: ${{ steps.sync-branch.outputs.branch_state }}"
                      exit 1
                      ;;
                  esac

                  pr_body="$(printf '%s\n\n%s\n%s' \
                    "Automatisk opprettet fordi synk mellom \`${{ env.SOURCE_BRANCH }}\` og \`${{ env.TARGET_BRANCH }}\` ga mergekonflikt." \
                    "Siste \`${{ env.SOURCE_BRANCH }}\`-commit som skal inn i \`${{ env.TARGET_BRANCH }}\`: \`${{ steps.main-ref.outputs.sha }}\`." \
                    "$branch_message")"

                  pr_number="$(gh pr list \
                    --repo "${{ github.repository }}" \
                    --head "${{ env.SYNC_BRANCH }}" \
                    --base "${{ env.TARGET_BRANCH }}" \
                    --state open \
                    --json number \
                    --jq '.[0].number // ""')"

                  if [ -n "$pr_number" ]; then
                    gh pr edit "$pr_number" \
                      --repo "${{ github.repository }}" \
                      --title "${{ env.SYNC_PR_TITLE }}" \
                      --body "$pr_body"
                    exit 0
                  fi

                  closed_pr_number="$(gh pr list \
                    --repo "${{ github.repository }}" \
                    --head "${{ env.SYNC_BRANCH }}" \
                    --base "${{ env.TARGET_BRANCH }}" \
                    --state closed \
                    --json number,mergedAt \
                    --jq 'map(select(.mergedAt == null))[0].number // ""')"

                  if [ -n "$closed_pr_number" ]; then
                    gh pr reopen "$closed_pr_number" --repo "${{ github.repository }}"
                    gh pr edit "$closed_pr_number" \
                      --repo "${{ github.repository }}" \
                      --title "${{ env.SYNC_PR_TITLE }}" \
                      --body "$pr_body"
                    exit 0
                  fi

                  gh pr create \
                    --repo "${{ github.repository }}" \
                    --base "${{ env.TARGET_BRANCH }}" \
                    --head "${{ env.SYNC_BRANCH }}" \
                    --title "${{ env.SYNC_PR_TITLE }}" \
                    --body "$pr_body"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
